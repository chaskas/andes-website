      legal_basis_contract: "Your data is processed for course enrollment purposes under Art. 6(1)(b) GDPR (performance of a contract or pre-contractual measures)."
      legal_basis_consent: "For analytics cookies (Google Analytics), we obtain your explicit consent under Art. 6(1)(a) GDPR."
      cookies_title: "4. Cookies and Google Analytics"
      cookies_intro: "Our website uses essential cookies necessary for the operation of the website (e.g., language preferences, cookie consent)."
      cookies_ga: "We use Google Analytics (Google Ireland Limited) to analyze usage of our website. Google Analytics sets cookies and transmits usage data to Google servers. IP addresses are anonymized."
      cookies_consent: "Google Analytics is only loaded after your explicit consent via our cookie banner. You can withdraw your consent at any time."
      retention_title: "5. Data Retention"
      retention_text: "Your enrollment data is stored for the duration of course organization and deleted after the end of the contractual relationship, unless legal retention periods apply. Google Analytics data is automatically deleted after 14 months."
      third_parties_title: "6. Third Parties"
      third_parties_items:
        - "Google Analytics (Google Ireland Limited) — website analysis, only with your consent"
        - "Hosting provider (Heroku / Salesforce) — technical operation of the website"
      rights_title: "7. Your Rights"
      rights_intro: "Under the GDPR, you have the following rights:"
      rights_items:
        - "Right of access (Art. 15 GDPR)"
        - "Right to rectification (Art. 16 GDPR)"
        - "Right to erasure (Art. 17 GDPR)"
        - "Right to restriction of processing (Art. 18 GDPR)"
        - "Right to data portability (Art. 20 GDPR)"
        - "Right to object (Art. 21 GDPR)"
      rights_complaint: "You also have the right to lodge a complaint with a supervisory authority. The competent authority is the Berlin Commissioner for Data Protection and Freedom of Information (datenschutz-berlin.de)."
      children_title: "8. Children's Data"
      children_text: "As our courses are aimed at children, we also process data of minors (name, age). According to Art. 8 GDPR, parental or guardian consent is required. For children under 16, enrollment is carried out exclusively by parents or legal guardians."
