      controller_title: "1. Verantwortliche Stelle"
      collection_title: "2. Welche Daten wir erheben"
      collection_intro: "Wenn Sie unser Anmeldeformular für eine Probestunde nutzen, erheben wir folgende Daten:"
      collection_items:
        - "Name des Schülers/der Schülerin"
