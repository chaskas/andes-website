          - "Respect"
          - "Cultural diversity"
          - "Community"
          - "Play and art"
          - "Empathy"
          - "Flexibility"
          - "Perseverance"
      audience:
        title: "Who is the school for?"
        description: "Everyone. From babies as young as 1 year old to seniors, Andes Academy is open to anyone who wishes to learn, play, express themselves or reconnect with music in a warm and multicultural environment."
