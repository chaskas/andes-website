  website:
    seo:
      og_title: "Andes Academy - Escuela de Música en Berlín"
      og_description: "Escuela de música multicultural en el corazón de Berlín. Clases de piano e iniciación musical para todas las edades, en español, alemán e inglés."
    accessibility:
      skip_to_content: "Saltar al contenido principal"
