    hero:
      title: "Andes Academy"
      tagline: "Donde la música cruza fronteras"
      description: "Un espacio íntimo, respetuoso y creativo para el desarrollo musical en el corazón de Berlín. Como la cordillera de los Andes que atraviesa países y fronteras, la música conecta culturas, transforma espacios y acompaña a las personas en su crecimiento."
      cta_classes: "Conoce Nuestras Clases"
      cta_contact: "Contáctanos"
      highlights:
        community:
          title: "Comunidad Multicultural"
          description: "Punto de encuentro para familias hispanohablantes, alemanas e internacionales que comparten el amor por la música."
        heart:
          title: "Desde el Corazón"
          description: "Fundada por la pianista chilena Paulina Suazo, con el deseo de ofrecer un lugar donde la música, la lengua y la cultura se entrelacen."
        ages:
          title: "Para Todas las Edades"
          description: "Desde bebés de 1 año hasta adultos mayores, todos son bienvenidos a aprender, jugar y expresarse con la música."
    about:
      title: "Sobre Nosotros"
      mission:
        title: "Nuestra Misión"
        p1: "Acompañar a los niños en su desarrollo emocional, artístico y —cuando corresponde— lingüístico, a través de la música. Promovemos una formación basada en la sensibilidad, la empatía y la conexión con el otro, más que en el virtuosismo técnico."
        p2: "Queremos que cada niño y niña despierte su oído, su cuerpo, su atención, y que la música sea una herramienta de descubrimiento del mundo y de sí mismo."
      vision:
        title: "Nuestra Visión"
        items:
          - "Ampliar nuestras clases a otros instrumentos como violín, cello, guitarra, charango y danza"
          - "Crear una comunidad diversa donde la música sea un lenguaje común"
          - "Formar personas creativas, sensibles y empáticas que puedan encontrar su camino con conciencia y propósito"
      values:
        title: "Nuestros Valores"
        subtitle: "Los pilares que guían cada clase y cada encuentro"
        items:
          - "Creatividad"
          - "Respeto"
          - "Diversidad cultural"
          - "Comunidad"
          - "Juego y arte"
          - "Empatía"
          - "Flexibilidad"
          - "Perseverancia"
      audience:
        title: "¿A quién va dirigida la escuela?"
        description: "A todos. Desde bebés de 1 año hasta adultos mayores, Andes Academy está abierta a quienes deseen aprender, jugar, expresarse o reencontrarse con la música en un ambiente cálido y multicultural."
    courses:
      title: "Nuestros Cursos"
      subtitle: "Programas diseñados para cada etapa del desarrollo"
      age_label: "Edad recomendada"
      languages_label: "Idiomas"
      modality_label: "Modalidad"
