    datenschutz:
      label: "Legal"
      title: "Política de Privacidad"
      email: "Correo electrónico"
      phone: "Teléfono"
      controller_title: "1. Responsable del tratamiento"
      collection_title: "2. Datos que recopilamos"
      collection_intro: "Cuando utiliza nuestro formulario de inscripción para una clase de prueba, recopilamos los siguientes datos:"
      collection_items:
        - "Nombre del alumno/a"
        - "Edad del alumno/a"
        - "Nombre de la persona de contacto"
        - "Dirección de correo electrónico"
        - "Número de teléfono (opcional)"
        - "Idioma preferido y tipo de clase"
        - "Disponibilidad horaria"
        - "Comentarios (opcional)"
      legal_basis_title: "3. Base legal"
      legal_basis_contract: "El tratamiento de sus datos en el marco de la inscripción al curso se realiza sobre la base del Art. 6(1)(b) del RGPD (ejecución de un contrato o medidas precontractuales)."
      legal_basis_consent: "Para las cookies de análisis (Google Analytics), obtenemos su consentimiento explícito según el Art. 6(1)(a) del RGPD."
      cookies_title: "4. Cookies y Google Analytics"
      cookies_intro: "Nuestro sitio web utiliza cookies esenciales necesarias para el funcionamiento del sitio (por ejemplo, preferencias de idioma, consentimiento de cookies)."
      cookies_ga: "Utilizamos Google Analytics (Google Ireland Limited) para analizar el uso de nuestro sitio web. Google Analytics establece cookies y transmite datos de uso a los servidores de Google. Las direcciones IP son anonimizadas."
      cookies_consent: "Google Analytics solo se carga después de su consentimiento explícito a través de nuestro banner de cookies. Puede revocar su consentimiento en cualquier momento."
      retention_title: "5. Período de conservación"
      retention_text: "Sus datos de inscripción se almacenan durante la organización del curso y se eliminan tras la finalización de la relación contractual, salvo que existan plazos legales de conservación. Los datos de Google Analytics se eliminan automáticamente después de 14 meses."
      third_parties_title: "6. Terceros"
      third_parties_items:
        - "Google Analytics (Google Ireland Limited) — análisis del sitio web, solo con su consentimiento"
        - "Proveedor de alojamiento (Heroku / Salesforce) — operación técnica del sitio web"
      rights_title: "7. Sus derechos"
      rights_intro: "Según el RGPD, usted tiene los siguientes derechos:"
      rights_items:
        - "Derecho de acceso (Art. 15 RGPD)"
        - "Derecho de rectificación (Art. 16 RGPD)"
        - "Derecho de supresión (Art. 17 RGPD)"
        - "Derecho a la limitación del tratamiento (Art. 18 RGPD)"
        - "Derecho a la portabilidad de datos (Art. 20 RGPD)"
        - "Derecho de oposición (Art. 21 RGPD)"
      rights_complaint: "También tiene derecho a presentar una reclamación ante una autoridad de control. La autoridad competente es la Comisionada de Berlín para la Protección de Datos y la Libertad de Información (datenschutz-berlin.de)."
      children_title: "8. Datos de menores"
      children_text: "Dado que nuestros cursos están dirigidos a niños, también procesamos datos de menores (nombre, edad). Según el Art. 8 del RGPD, se requiere el consentimiento de los padres o tutores. Para menores de 16 años, la inscripción se realiza exclusivamente por los padres o tutores legales."
      back_home: "Volver al inicio"
    cookie_consent:
