    hero:
      title: "Andes Academy"
      tagline: "Where music crosses borders"
      description: "An intimate, respectful and creative space for musical development in the heart of Berlin. Like the Andes mountain range that crosses countries and borders, music connects cultures, transforms spaces and accompanies people in their growth."
      cta_classes: "Discover Our Classes"
      cta_contact: "Contact Us"
      cta_trial: "Book your free trial class"
      highlights:
        community:
          title: "Multicultural Community"
          description: "A meeting point for Spanish-speaking, German and international families who share a love for music."
        heart:
          title: "From the Heart"
          description: "Founded by Chilean pianist Paulina Suazo, with the desire to offer a place where music, language and culture intertwine."
        ages:
          title: "For All Ages"
          description: "From babies as young as 1 year old to seniors, everyone is welcome to learn, play and express themselves through music."
    about:
      title: "About Us"
      mission:
        title: "Our Mission"
        p1: "To accompany children in their emotional, artistic and —when appropriate— linguistic development through music. We promote training based on sensitivity, empathy and connection with others, rather than technical virtuosity."
        p2: "We want every child to awaken their hearing, their body, their attention, and for music to be a tool for discovering the world and themselves."
      vision:
        title: "Our Vision"
        items:
          - "Expand our classes to other instruments such as violin, cello, guitar, charango and dance"
          - "Create a diverse community where music is a common language"
          - "Develop creative, sensitive and empathetic people who can find their path with awareness and purpose"
      values:
        title: "Our Values"
        subtitle: "The pillars that guide every class and every encounter"
        items:
          - "Creativity"
          - "Respect"
          - "Cultural diversity"
          - "Community"
          - "Play and art"
          - "Empathy"
          - "Flexibility"
          - "Perseverance"
      audience:
        title: "Who is the school for?"
        description: "Everyone. From babies as young as 1 year old to seniors, Andes Academy is open to anyone who wishes to learn, play, express themselves or reconnect with music in a warm and multicultural environment."
