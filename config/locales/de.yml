    hero:
      title: "Andes Academy"
      tagline: "Wo Musik Grenzen überschreitet"
      description: "Ein intimer, respektvoller und kreativer Raum für die musikalische Entwicklung im Herzen Berlins. Wie die Andenkordillere, die Länder und Grenzen durchquert, verbindet Musik Kulturen, verwandelt Räume und begleitet Menschen in ihrem Wachstum."
      cta_classes: "Entdecken Sie unsere Kurse"
      cta_contact: "Kontaktieren Sie uns"
      highlights:
        community:
          title: "Multikulturelle Gemeinschaft"
          description: "Ein Treffpunkt für spanischsprachige, deutsche und internationale Familien, die die Liebe zur Musik teilen."
        heart:
          title: "Von Herzen"
          description: "Gegründet von der chilenischen Pianistin Paulina Suazo, mit dem Wunsch, einen Ort zu bieten, an dem Musik, Sprache und Kultur sich verweben."
        ages:
          title: "Für alle Altersgruppen"
          description: "Von Babys ab 1 Jahr bis zu Senioren — alle sind willkommen zu lernen, zu spielen und sich durch Musik auszudrücken."
    about:
      title: "Über uns"
      mission:
        title: "Unsere Mission"
        p1: "Kinder in ihrer emotionalen, künstlerischen und — wenn angemessen — sprachlichen Entwicklung durch Musik zu begleiten. Wir fördern eine Ausbildung, die auf Sensibilität, Empathie und Verbindung mit anderen basiert, mehr als auf technischer Virtuosität."
        p2: "Wir möchten, dass jedes Kind sein Gehör, seinen Körper, seine Aufmerksamkeit weckt und dass Musik ein Werkzeug zur Entdeckung der Welt und seiner selbst wird."
      vision:
        title: "Unsere Vision"
        items:
          - "Unser Kursangebot auf weitere Instrumente wie Violine, Cello, Gitarre, Charango und Tanz erweitern"
          - "Eine vielfältige Gemeinschaft schaffen, in der Musik eine gemeinsame Sprache ist"
          - "Kreative, sensible und empathische Menschen ausbilden, die ihren Weg mit Bewusstsein und Sinn finden können"
      values:
        title: "Unsere Werte"
        subtitle: "Die Säulen, die jede Stunde und jede Begegnung leiten"
        items:
          - "Kreativität"
          - "Respekt"
          - "Kulturelle Vielfalt"
          - "Gemeinschaft"
          - "Spiel und Kunst"
          - "Empathie"
          - "Flexibilität"
          - "Ausdauer"
      audience:
        title: "Für wen ist die Schule?"
        description: "Für alle. Von Babys ab 1 Jahr bis zu Senioren — die Andes Academy steht allen offen, die lernen, spielen, sich ausdrücken oder die Musik in einer warmen und multikulturellen Umgebung wiederentdecken möchten."
    courses:
      title: "Unsere Kurse"
      subtitle: "Programme für jede Entwicklungsstufe"
      age_label: "Empfohlenes Alter"
      languages_label: "Sprachen"
      modality_label: "Modalität"
      duration_label: "Dauer"
      pricing_label: "Preise"
