      piano:
        title: "Clases de Piano"
        age: "Desde los 4 años"
        languages: "Español, alemán, inglés"
        modality: "Individual / Presencial"
        duration: "20, 30, 45 o 60 minutos"
        description_1: "Ofrecemos clases de piano personalizadas, adaptadas al ritmo y sensibilidad de cada estudiante."
        description_2: "El proceso de aprendizaje se construye desde el juego, la escucha, el movimiento y la expresión artística, sin presiones ni exigencias técnicas tempranas."
        goal: "Nuestro objetivo es formar personas conectadas con la música, capaces de explorar su mundo interior y expresarlo a través del instrumento."
        prices:
          - duration: "20 min"
            price: "60 EUR / mes"
          - duration: "30 min"
            price: "90 EUR / mes"
          - duration: "40 min"
            price: "120 EUR / mes"
          - duration: "60 min"
            price: "150 EUR / mes"
        info:
          - "Frecuencia: 1 clase semanal"
          - "Horarios a convenir directamente con la profesora"
          - "Clases en español, alemán o inglés"
      initiation:
        title: "Iniciación Musical"
        age: "De 1 a 5 años (con adulto)"
        languages: "Español o alemán"
        modality: "Grupo pequeño / Presencial"
        duration: "45 min / Máx. 7 niños por sesión"
        description_1: "Un espacio cálido, creativo y seguro donde los más pequeños exploran el mundo de la música a través del juego, el canto, el ritmo y el movimiento."
        description_2: "Cada clase estimula el desarrollo emocional, lingüístico y sensorial, creando una base musical viva y significativa desde la primera infancia."
        description_3: "Trabajamos con instrumentos simples: huevitos sonajeros, claves, cintas, pañuelos, y música en vivo. Las actividades se adaptan al desarrollo evolutivo de cada niño."
        focus: "El foco está en ofrecer experiencias significativas de conexión, atención y alegría compartida."
        price: "40 EUR / mes"
        info:
          - "Frecuencia: 1 clase semanal (45 minutos)"
          - "Máximo 7 niños por grupo (con acompañante)"
          - "Clases en español o alemán"
