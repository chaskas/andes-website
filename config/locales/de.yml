      legal_basis_title: "3. Rechtsgrundlage"
      legal_basis_contract: "Die Verarbeitung Ihrer Daten im Rahmen der Kursanmeldung erfolgt auf Grundlage von Art. 6 Abs. 1 lit. b DSGVO (Vertragserfüllung bzw. vorvertragliche Maßnahmen)."
      legal_basis_consent: "Für die Nutzung von Analyse-Cookies (Google Analytics) holen wir Ihre ausdrückliche Einwilligung gemäß Art. 6 Abs. 1 lit. a DSGVO ein."
      cookies_title: "4. Cookies und Google Analytics"
      cookies_intro: "Unsere Website verwendet essenzielle Cookies, die für den Betrieb der Website notwendig sind (z.B. Spracheinstellungen, Cookie-Einwilligung)."
      cookies_ga: "Wir nutzen Google Analytics (Google Ireland Limited), um die Nutzung unserer Website zu analysieren. Google Analytics setzt Cookies und überträgt Nutzungsdaten an Google-Server. IP-Adressen werden anonymisiert."
      cookies_consent: "Google Analytics wird erst nach Ihrer ausdrücklichen Einwilligung über unser Cookie-Banner geladen. Sie können Ihre Einwilligung jederzeit widerrufen."
      retention_title: "5. Speicherdauer"
      retention_text: "Ihre Anmeldedaten werden für die Dauer der Kursorganisation gespeichert und nach Beendigung des Vertragsverhältnisses gelöscht, sofern keine gesetzlichen Aufbewahrungsfristen entgegenstehen. Google-Analytics-Daten werden nach 14 Monaten automatisch gelöscht."
      third_parties_title: "6. Weitergabe an Dritte"
      third_parties_items:
        - "Google Analytics (Google Ireland Limited) — Website-Analyse, nur mit Ihrer Einwilligung"
        - "Hosting-Anbieter (Heroku / Salesforce) — technischer Betrieb der Website"
      rights_title: "7. Ihre Rechte"
      rights_intro: "Sie haben gemäß DSGVO folgende Rechte:"
      rights_items:
        - "Recht auf Auskunft (Art. 15 DSGVO)"
        - "Recht auf Berichtigung (Art. 16 DSGVO)"
        - "Recht auf Löschung (Art. 17 DSGVO)"
        - "Recht auf Einschränkung der Verarbeitung (Art. 18 DSGVO)"
        - "Recht auf Datenübertragbarkeit (Art. 20 DSGVO)"
        - "Widerspruchsrecht (Art. 21 DSGVO)"
      rights_complaint: "Sie haben zudem das Recht, sich bei einer Aufsichtsbehörde zu beschweren. Zuständig ist die Berliner Beauftragte für Datenschutz und Informationsfreiheit (datenschutz-berlin.de)."
      children_title: "8. Daten von Kindern"
      children_text: "Da unsere Kurse sich an Kinder richten, verarbeiten wir auch Daten von Minderjährigen (Name, Alter). Gemäß Art. 8 DSGVO ist hierfür die Einwilligung der Eltern bzw. Erziehungsberechtigten erforderlich. Bei Kindern unter 16 Jahren erfolgt die Anmeldung ausschließlich durch die Erziehungsberechtigten."
      back_home: "Zurück zur Startseite"
