        duration: "45 min / Max. 7 children per session"
        description_1: "A warm, creative and safe space where the youngest children explore the world of music through play, singing, rhythm and movement."
        description_2: "Each class stimulates emotional, linguistic and sensory development, creating a living and meaningful musical foundation from early childhood."
        description_3: "We work with simple instruments: egg shakers, claves, ribbons, scarves, and live music. Activities are adapted to each child's developmental stage."
        focus: "The focus is on offering meaningful experiences of connection, attention and shared joy."
        price: "40 EUR / month"
        info:
