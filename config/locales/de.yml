      piano:
        title: "Klavierunterricht"
        age: "Ab 4 Jahren"
        languages: "Spanisch, Deutsch, Englisch"
        modality: "Einzelunterricht / Präsenz"
        duration: "20, 30, 45 oder 60 Minuten"
        description_1: "Wir bieten personalisierten Klavierunterricht, angepasst an den Rhythmus und die Sensibilität jedes Schülers."
        description_2: "Der Lernprozess baut auf Spiel, Zuhören, Bewegung und künstlerischem Ausdruck auf, ohne Druck oder frühe technische Anforderungen."
        goal: "Unser Ziel ist es, Menschen auszubilden, die mit der Musik verbunden sind und fähig sind, ihre innere Welt zu erkunden und durch das Instrument auszudrücken."
        prices:
          - duration: "20 Min."
            price: "60 EUR / Monat"
          - duration: "30 Min."
            price: "90 EUR / Monat"
          - duration: "40 Min."
            price: "120 EUR / Monat"
          - duration: "60 Min."
            price: "150 EUR / Monat"
        info:
          - "Häufigkeit: 1 Stunde pro Woche"
          - "Termine direkt mit der Lehrerin zu vereinbaren"
          - "Unterricht auf Spanisch, Deutsch oder Englisch"
          - "Jährliches Schülerkonzert"
      initiation:
        title: "Musikalische Früherziehung"
        age: "1 bis 5 Jahre (mit Erwachsenem)"
        languages: "Spanisch oder Deutsch"
        modality: "Kleingruppe / Präsenz"
        duration: "45 Min. / Max. 7 Kinder pro Sitzung"
        description_1: "Ein warmer, kreativer und sicherer Raum, in dem die Kleinsten die Welt der Musik durch Spiel, Gesang, Rhythmus und Bewegung erkunden."
        description_2: "Jede Stunde fördert die emotionale, sprachliche und sensorische Entwicklung und schafft eine lebendige und bedeutungsvolle musikalische Grundlage von früher Kindheit an."
        description_3: "Wir arbeiten mit einfachen Instrumenten: Eier-Rasseln, Klanghölzer, Bänder, Tücher und Live-Musik. Die Aktivitäten werden an die Entwicklungsstufe jedes Kindes angepasst."
        focus: "Der Fokus liegt darauf, bedeutungsvolle Erfahrungen der Verbindung, Aufmerksamkeit und geteilten Freude zu bieten."
        price: "40 EUR / Monat"
        info:
          - "Häufigkeit: 1 Stunde pro Woche (45 Minuten)"
          - "Maximal 7 Kinder pro Gruppe (mit Begleitperson)"
          - "Unterricht auf Spanisch oder Deutsch"
    enrollment:
