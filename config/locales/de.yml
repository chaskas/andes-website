    seo:
      og_title: "Andes Academy - Musikschule in Berlin"
      og_description: "Multikulturelle Musikschule im Herzen Berlins. Klavierunterricht und musikalische Früherziehung für alle Altersgruppen, auf Spanisch, Deutsch und Englisch."
    accessibility:
      skip_to_content: "Zum Hauptinhalt springen"
